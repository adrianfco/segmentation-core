name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  build-and-test:
    name: Build and test (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y python3-dev python3-pytest

      - name: Install Python build tools
        run: pip3 install scikit-build-core --break-system-packages -q

      - name: Build and install Python package
        run: pip3 install . --break-system-packages -q

      - name: Build C++ tests
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build --parallel --target test_segmentation

      - name: Run C++ tests
        run: ./build/test_segmentation

      - name: Python smoke import
        run: python3 -c "from segmentation_core import segment_image; print('import ok')"

      - name: Generate test fixtures
        run: python3 tests/make_fixture.py

      - name: Run Python tests
        run: python3 -m pytest tests/test_python_bindings.py -v
